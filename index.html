// ── Date Utilities ───────────────────────────────────────────────────────────
function todayStr() { return new Date().toISOString().substring(0,10); }

function addDays(str, n) {
  const d = new Date(str + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return d.toISOString().substring(0,10);
}

function getQuickRange(qp) {
  const today = todayStr();
  if (qp === 'today') return { from: today, to: today };
  if (qp === 'week')  return { from: addDays(today, -6), to: today };
  if (qp === 'month') {
    const d = new Date(); const s = new Date(d.getFullYear(), d.getMonth(), 1);
    return { from: s.toISOString().substring(0,10), to: today };
  }
  return { from: '', to: '' }; // 'all'
}

function prevRange(from, to) {
  if (!from || !to) return null;
  const days = Math.round((new Date(to+'T00:00:00') - new Date(from+'T00:00:00')) / 86400000) + 1;
  return { from: addDays(from, -days), to: addDays(from, -1) };
}

function filterByRange(orders, from, to) {
  if (!from && !to) return orders;
  return orders.filter(o => (!from || o.date >= from) && (!to || o.date <= to));
}

function pctChange(curr, prev) {
  if (!prev || prev === 0) return null;
  return ((curr - prev) / prev * 100);
}

function weekStart(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const day = d.getDay();
  d.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
  return d.toISOString().substring(0,10);
}

function groupForChart(orders, groupBy) {
  const dlv = orders.filter(o => !['cancelled','failed','rejected'].includes((o.status||'').toLowerCase()));
  const map = {};
  dlv.forEach(o => {
    let key, label;
    if (groupBy === 'week') {
      key = weekStart(o.date);
      label = key.slice(5);
    } else if (groupBy === 'month') {
      key = o.date.substring(0, 7);
      const d = new Date(o.date + 'T00:00:00');
      label = d.toLocaleDateString('en-PH', { month: 'short', year: '2-digit' });
    } else {
      key = o.date; label = o.date.slice(5);
    }
    if (!map[key]) map[key] = { date: label, sales: 0, count: 0 };
    map[key].sales += o.total;
    map[key].count += 1;
  });
  return Object.entries(map).sort(([a],[b]) => a.localeCompare(b))
    .map(([,v]) => ({ ...v, sales: Math.round(v.sales) }));
}

// ── CSV Parser ───────────────────────────────────────────────────────────────
function parseCSV(text, forcedStore) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return [];
  const delim = lines[0].includes(';') ? ';' : ',';
  const headers = lines[0].split(delim).map(h => h.replace(/"/g,'').trim().toLowerCase());
  const col = (...n) => { for (const x of n) { const i=headers.findIndex(h=>h.includes(x)); if (i>=0) return i; } return -1; };
  const idC=col('order id','order number','id'), dateC=col('date','time','created'),
        totalC=col('total','amount','subtotal','net'), statC=col('status','state'),
        itemC=col('item','product','menu','name'), qtyC=col('qty','quantity'),
        storeC=col('store','branch','outlet','location');
  const map={}, orders=[];
  for (let i=1; i<lines.length; i++) {
    const row=lines[i].split(delim).map(c=>c.replace(/"/g,'').trim());
    if (row.length<2||!row.some(Boolean)) continue;
    const oid   = idC>=0    ? row[idC]                             : `row-${i}`;
    const date  = dateC>=0  ? row[dateC].substring(0,10)           : todayStr();
    const total = totalC>=0 ? parseFloat(row[totalC].replace(/[₱,\s]/g,''))||0 : 0;
    const status= statC>=0  ? row[statC]                           : 'Delivered';
    const iname = itemC>=0  ? row[itemC]                           : 'Item';
    const qty   = qtyC>=0   ? parseInt(row[qtyC])||1               : 1;
    let store = forcedStore || (storeC>=0&&row[storeC] ? (row[storeC].toLowerCase().includes('canto')?'Canto Fresco':'Ayo Cafe') : 'Ayo Cafe');
    if (map[oid]) map[oid].items.push({name:iname,qty});
    else { const o={id:oid,date,total,status,store,items:[{name:iname,qty}]}; map[oid]=o; orders.push(o); }
  }
  return orders;
}

// ── Metrics ──────────────────────────────────────────────────────────────────
function calcMetrics(orders) {
  const dlv = orders.filter(o => !['cancelled','failed','rejected'].includes((o.status||'').toLowerCase()));
  const totalSales=dlv.reduce((s,o)=>s+o.total,0), orderCount=dlv.length;
  const avgOrderValue=orderCount?totalSales/orderCount:0;
  const itemMap={};
  dlv.forEach(o=>o.items?.forEach(it=>{itemMap[it.name]=(itemMap[it.name]||0)+it.qty;}));
  const topItems=Object.entries(itemMap).map(([name,qty])=>({name,qty})).sort((a,b)=>b.qty-a.qty).slice(0,8);
  return {totalSales,orderCount,avgOrderValue,topItems};
}

// ── SVG Charts ───────────────────────────────────────────────────────────────
function LineChartSVG({ data, color }) {
  if (!data.length) return <div style={{color:C.gray,fontSize:12,textAlign:'center',padding:24}}>No data for this period</div>;
  const W=340,H=160,pl=50,pr=10,pt=10,pb=32,pw=W-pl-pr,ph=H-pt-pb;
  const vals=data.map(d=>d.sales), max=Math.max(...vals)||1, min=Math.min(...vals)||0, range=max-min||1;
  const pts=data.map((d,i)=>[pl+(i/(data.length-1||1))*pw, pt+ph-((d.sales-min)/range)*ph]);
  const skip = data.length > 12 ? Math.ceil(data.length / 10) : 1;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:H}}>
      {[0,.25,.5,.75,1].map(t=>(
        <line key={t} x1={pl} y1={pt+t*ph} x2={W-pr} y2={pt+t*ph} stroke="#F0EAE0" strokeWidth="1"/>
      ))}
      {pts.length>1&&<polyline points={pts.map(p=>p.join(',')).join(' ')} fill="none" stroke={color} strokeWidth="2.5" strokeLinejoin="round"/>}
      {/* area fill */}
      {pts.length>1&&<polygon points={`${pts[0][0]},${pt+ph} ${pts.map(p=>p.join(',')).join(' ')} ${pts[pts.length-1][0]},${pt+ph}`} fill={color} fillOpacity=".08"/>}
      {pts.map(([x,y],i)=><circle key={i} cx={x} cy={y} r="3" fill={color}/>)}
      {data.map((d,i)=>{
        if (i % skip !== 0 && i !== data.length-1) return null;
        const x=pl+(i/(data.length-1||1))*pw;
        return <text key={i} x={x} y={H-6} textAnchor="middle" fontSize="8.5" fill={C.gray} transform={data.length>8?`rotate(-30,${x},${H-6})`:undefined}>{d.date}</text>;
      })}
      {[0,.5,1].map(t=>{
        const v=min+t*range;
        return <text key={t} x={pl-4} y={pt+ph-t*ph+4} textAnchor="end" fontSize="8.5" fill={C.gray}>{v>=1000?`${(v/1000).toFixed(0)}k`:Math.round(v)}</text>;
      })}
    </svg>
  );
}

function BarChartSVG({ data, color }) {
  if (!data.length) return null;
  const W=320,barH=18,gap=7,pl=96,pr=40,pt=4;
  const H=pt+data.length*(barH+gap);
  const max=Math.max(...data.map(d=>d.qty))||1, bw=W-pl-pr;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:H}}>
      {data.map((d,i)=>{
        const y=pt+i*(barH+gap), fw=Math.max(4,(d.qty/max)*bw);
        const label=d.name.length>14?d.name.slice(0,13)+'…':d.name;
        return (
          <g key={i}>
            <text x={pl-6} y={y+barH/2+4} textAnchor="end" fontSize="9" fill={C.navy}>{label}</text>
            <rect x={pl} y={y} width={fw} height={barH} rx="4" fill={color}/>
            <text x={pl+fw+5} y={y+barH/2+4} fontSize="9" fill={C.gray}>{d.qty}×</text>
          </g>
        );
      })}
    </svg>
  );
}

// ── Hooks ────────────────────────────────────────────────────────────────────
function useWindowWidth() {
  const [w,setW]=useState(window.innerWidth);
  useEffect(()=>{ const h=()=>setW(window.innerWidth); window.addEventListener('resize',h); return ()=>window.removeEventListener('resize',h); },[]);
  return w;
}

// ── Delta Badge ──────────────────────────────────────────────────────────────
function DeltaBadge({ curr, prev }) {
  const pct = pctChange(curr, prev);
  if (pct === null) return null;
  const up = pct >= 0;
  return (
    <span style={{display:'inline-block',background:up?C.green+'22':C.red+'22',color:up?C.green:C.red,borderRadius:20,padding:'2px 8px',fontSize:10,fontWeight:700,marginTop:4}}>
      {up?'↑':'↓'} {Math.abs(pct).toFixed(1)}% vs prev
    </span>
  );
}

// ── Dashboard ────────────────────────────────────────────────────────────────
function Dashboard() {
  const width=useWindowWidth(), mob=width<768;
  const [tab,          setTab]        = useState('overview');
  const [store,        setStore]      = useState('All Stores');
  const [orders,       setOrders]     = useState([]);
  const [reminders,    setRem]        = useState([]);
  const [newRem,       setNewRem]     = useState({text:'',due:'',priority:'medium',store:'All Stores'});
  const [impMsg,       setImpMsg]     = useState('');
  const [lastImp,      setLastImp]    = useState({});
  const [sideOpen,     setSideOpen]   = useState(false);
  const [importTarget, setImportTgt]  = useState('Ayo Cafe');
  // Date / period filter
  const [quickPct,  setQuickPct]  = useState('all');   // 'all'|'today'|'week'|'month'|'custom'
  const [dateFrom,  setDateFrom]  = useState('');
  const [dateTo,    setDateTo]    = useState('');
  const [groupBy,   setGroupBy]   = useState('day');   // 'day'|'week'|'month'
  // Per-store custom date
  const [storeFrom, setStoreFrom] = useState({ 'Ayo Cafe':'', 'Canto Fresco':'' });
  const [storeTo,   setStoreTo]   = useState({ 'Ayo Cafe':'', 'Canto Fresco':'' });
  const fileRef = useRef();

  useEffect(()=>{
    const d=loadSt(); if (!d) return;
    if (d.orders?.length)  setOrders(d.orders);
    if (d.reminders)       setRem(d.reminders);
    if (d.lastImp)         setLastImp(d.lastImp);
    if (d.quickPct)        setQuickPct(d.quickPct);
    if (d.groupBy)         setGroupBy(d.groupBy);
  },[]);

  const persist = (o,rem,li) => saveSt({orders:o,reminders:rem,lastImp:li,quickPct,groupBy});

  // ── Date range logic ───────────────────────────────────────────────────────
  const baseRange = quickPct === 'custom' ? {from:dateFrom, to:dateTo} : getQuickRange(quickPct);

  // For "All Stores" view — each store can have its own date override
  const rangeFor = (s) => {
    if (store !== 'All Stores') return baseRange;
    const f = storeFrom[s], t = storeTo[s];
    if (f || t) return { from: f, to: t };
    return baseRange;
  };

  // Orders for the current store filter
  const storeOrders = store === 'All Stores' ? orders : orders.filter(o=>o.store===store);
  const periodOrders = filterByRange(storeOrders, baseRange.from, baseRange.to);

  // Previous period for comparison
  const prev = prevRange(baseRange.from, baseRange.to);
  const prevOrders  = prev ? filterByRange(storeOrders, prev.from, prev.to) : [];
  const prevMetrics = prevOrders.length ? calcMetrics(prevOrders) : null;

  const metrics  = periodOrders.length ? calcMetrics(periodOrders) : null;
  const m        = metrics || {};
  const topItems = m.topItems || [];

  // Chart data — if all-stores, merge per-store ranges
  const chartOrders = store === 'All Stores'
    ? STORE_KEYS.flatMap(s => filterByRange(orders.filter(o=>o.store===s), rangeFor(s).from, rangeFor(s).to))
    : periodOrders;
  const chartData = groupForChart(chartOrders, groupBy);

  // Grand totals (always all data, no filter)
  const grandMetrics = storeOrders.length ? calcMetrics(storeOrders) : null;

  // ── CSV import ─────────────────────────────────────────────────────────────
  const handleFile = async e => {
    const file=e.target.files[0]; if (!file) return;
    setImpMsg(`Reading ${file.name}…`);
    try {
      const text=await file.text(), parsed=parseCSV(text, importTarget);
      if (!parsed.length) { setImpMsg('❌ Cannot parse CSV.'); return; }
      const prev=orders.filter(o=>o.store===importTarget);
      const kept=orders.filter(o=>o.store!==importTarget), merged=[...kept,...parsed];
      const li={...lastImp,[importTarget]:{file:file.name,time:new Date().toLocaleString('en-PH'),count:parsed.length,prev:prev.length}};
      setOrders(merged); setLastImp(li);
      const newCount=parsed.length-prev.length;
      setImpMsg(`✅ ${parsed.length} orders for ${STORE_ICON[importTarget]} ${importTarget}${newCount>0?` (+${newCount} new)`:''}`);
      persist(merged,reminders,li);
      setTimeout(()=>setImpMsg(''),7000);
    } catch { setImpMsg('❌ Error reading file.'); }
    e.target.value='';
  };

  const loadDemo = () => {
    const li={
      'Ayo Cafe':    {file:'demo-ayo.csv',  time:new Date().toLocaleString('en-PH'),count:DEMO_ORDERS.filter(o=>o.store==='Ayo Cafe').length,prev:0},
      'Canto Fresco':{file:'demo-canto.csv',time:new Date().toLocaleString('en-PH'),count:DEMO_ORDERS.filter(o=>o.store==='Canto Fresco').length,prev:0},
    };
    setOrders(DEMO_ORDERS); setLastImp(li); setImpMsg('✅ Demo data loaded for both stores!');
    persist(DEMO_ORDERS,reminders,li); setTimeout(()=>setImpMsg(''),4000);
  };

  const clearStore = s => {
    const kept=orders.filter(o=>o.store!==s), li={...lastImp}; delete li[s];
    setOrders(kept); setLastImp(li); persist(kept,reminders,li);
  };

  const applyQuick = qp => {
    setQuickPct(qp);
    if (qp !== 'custom') { setDateFrom(''); setDateTo(''); }
    // Auto groupBy
    if (qp === 'today') setGroupBy('day');
    if (qp === 'week')  setGroupBy('day');
    if (qp === 'month') setGroupBy('day');
    if (qp === 'all')   setGroupBy('month');
  };

  // ── Reminders ──────────────────────────────────────────────────────────────
  const addRem = () => {
    if (!newRem.text.trim()) return;
    const r={...newRem,id:Date.now(),done:false}, u=[...reminders,r];
    setRem(u); setNewRem({text:'',due:'',priority:'medium',store:'All Stores'}); persist(orders,u,lastImp);
  };
  const toggleRem = id => { const u=reminders.map(r=>r.id===id?{...r,done:!r.done}:r); setRem(u); persist(orders,u,lastImp); };
  const deleteRem = id => { const u=reminders.filter(r=>r.id!==id); setRem(u); persist(orders,u,lastImp); };
  const filtRem   = store==='All Stores'?reminders:reminders.filter(r=>r.store==='All Stores'||r.store===store);
  const overdue   = filtRem.filter(r=>!r.done&&r.due&&new Date(r.due)<new Date()).length;

  const exportCSV = () => {
    const rows=[['Order ID','Date','Day','Store','Items','Total','Status']];
    periodOrders.forEach(o=>{
      const day=new Date(o.date+'T00:00:00').toLocaleDateString('en-PH',{weekday:'long'});
      rows.push([o.id,o.date,day,o.store,o.items?.map(i=>`${i.name}x${i.qty}`).join('; ')||'',o.total,o.status]);
    });
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([rows.map(r=>r.join(',')).join('\n')],{type:'text/csv'}));
    a.download=`${store.replace(' ','-').toLowerCase()}-${quickPct}-export.csv`; a.click();
  };

  // ── Styles ─────────────────────────────────────────────────────────────────
  const ac   = STORE_COLOR[store];
  const card = {background:'#fff',borderRadius:12,padding:mob?14:20,boxShadow:'0 2px 10px rgba(27,43,75,.08)'};
  const btn  = (bg=ac,fg='#fff',x={}) => ({background:bg,color:fg,border:'none',borderRadius:8,padding:mob?'7px 11px':'8px 14px',cursor:'pointer',fontSize:mob?11:12,fontWeight:600,whiteSpace:'nowrap',...x});
  const inp  = {border:`1px solid ${C.border}`,borderRadius:8,padding:'8px 11px',fontSize:13,width:'100%',boxSizing:'border-box',outline:'none',fontFamily:'inherit'};
  const lbl  = {color:C.gray,fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:.5,margin:0};

  // ── Period / Date Filter Bar ───────────────────────────────────────────────
  const FilterBar = () => (
    <div style={{...card,marginBottom:12,padding:mob?12:16}}>
      {/* Quick period tabs */}
      <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:quickPct==='custom'?10:0}}>
        {QUICK_PCTS.map(q=>(
          <button key={q.id} onClick={()=>applyQuick(q.id)}
            style={{...btn(quickPct===q.id?ac:'#f0ebe5',quickPct===q.id?'#fff':C.navy),fontSize:mob?10:11,padding:'6px 12px',borderRadius:20,border:`1.5px solid ${quickPct===q.id?ac:C.border}`}}>
            {q.label}
          </button>
        ))}
        <div style={{flex:1}}/>

            ) : mob ? (
              <div style={{display:'grid',gap:10}}>
                {[...periodOrders].sort((a,b)=>new Date(b.date)-new Date(a.date)).map((o,i)=>{
                  const canc=['cancelled','failed','rejected'].includes((o.status||'').toLowerCase());
                  const sc=STORE_COLOR[o.store]||C.orange;
                  const day=new Date(o.date+'T00:00:00').toLocaleDateString('en-PH',{weekday:'short'});
                  return (
                    <div key={i} style={{...card,borderLeft:`4px solid ${sc}`}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                        <div>
                          <p style={{fontWeight:700,color:C.navy,margin:0,fontSize:13}}>{o.id}</p>
                          <p style={{color:C.gray,fontSize:11,margin:'2px 0 0'}}>📅 {o.date} ({day})</p>
                        </div>
                        <div style={{textAlign:'right'}}>
                          <p style={{fontWeight:700,color:ac,margin:0,fontSize:14}}>₱{o.total.toLocaleString('en-PH',{minimumFractionDigits:2})}</p>
                          <span style={{background:(canc?C.red:C.green)+'22',color:canc?C.red:C.green,borderRadius:20,padding:'2px 8px',fontSize:10,fontWeight:700}}>{canc?'❌':'✅'} {o.status}</span>
                        </div>
                      </div>
                      <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                        <span style={{background:sc+'22',color:sc,borderRadius:20,padding:'2px 8px',fontSize:10,fontWeight:600}}>{STORE_ICON[o.store]} {o.store}</span>
                        {o.items?.map((it,j)=><span key={j} style={{background:C.cream,border:`1px solid ${C.border}`,borderRadius:6,padding:'2px 7px',fontSize:10}}>{it.name} ×{it.qty}</span>)}
                      </div>
                    </div>
                  );
                })}
                <div style={{...card,background:'#f0ebe5',textAlign:'center',padding:14}}>
                  <p style={{fontSize:13,fontWeight:700,color:C.navy}}>
                    Period Total: ₱{periodOrders.filter(o=>!['cancelled','failed','rejected'].includes((o.status||'').toLowerCase())).reduce((s,o)=>s+o.total,0).toLocaleString('en-PH',{minimumFractionDigits:2})}
                    &nbsp;·&nbsp; {periodOrders.length} orders
                  </p>
                </div>
              </div>
            ) : (
              <div style={card}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14,flexWrap:'wrap',gap:8}}>
                  <p style={{fontWeight:700,color:C.navy,margin:0}}>{periodOrders.length} Orders — {store}</p>
                  <div style={{display:'flex',gap:12}}>
                    <span style={{fontSize:12,color:C.gray}}>
                      Period Sales: <b style={{color:ac}}>₱{periodOrders.filter(o=>!['cancelled','failed','rejected'].includes((o.status||'').toLowerCase())).reduce((s,o)=>s+o.total,0).toLocaleString('en-PH',{minimumFractionDigits:2})}</b>
                    </span>
                  </div>
                </div>
                <div style={{overflowX:'auto'}}>
                  <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
                    <thead>
                      <tr style={{background:C.cream}}>
                        {['Order ID','Date','Day','Store','Items Ordered','Total','Status'].map(h=>(
                          <th key={h} style={{textAlign:'left',padding:'10px 14px',fontSize:11,fontWeight:700,color:C.gray,textTransform:'uppercase',letterSpacing:.5,whiteSpace:'nowrap'}}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {[...periodOrders].sort((a,b)=>new Date(b.date)-new Date(a.date)).map((o,i)=>{
                        const d=new Date(o.date+'T00:00:00'), day=d.toLocaleDateString('en-PH',{weekday:'long'});
                        const canc=['cancelled','failed','rejected'].includes((o.status||'').toLowerCase());
                        const sc=STORE_COLOR[o.store]||C.orange;
                        return (
                          <tr key={i} style={{borderTop:`1px solid ${C.border}`,background:i%2===0?'#fff':'#FDFAF7'}}>
                            <td style={{padding:'11px 14px',fontWeight:600,color:C.navy,whiteSpace:'nowrap'}}>{o.id}</td>
                            <td style={{padding:'11px 14px',color:C.navy,whiteSpace:'nowrap'}}>📅 {o.date}</td>
                            <td style={{padding:'11px 14px',color:C.gray,whiteSpace:'nowrap'}}>{day}</td>
                            <td style={{padding:'11px 14px',whiteSpace:'nowrap'}}><span style={{background:sc+'22',color:sc,borderRadius:20,padding:'3px 10px',fontSize:11,fontWeight:700}}>{STORE_ICON[o.store]} {o.store}</span></td>
                            <td style={{padding:'11px 14px',maxWidth:220}}>{o.items?.map((it,j)=><span key={j} style={{display:'inline-block',background:C.cream,border:`1px solid ${C.border}`,borderRadius:6,padding:'2px 7px',fontSize:11,margin:'2px 2px 2px 0',whiteSpace:'nowrap'}}>{it.name} ×{it.qty}</span>)}</td>
                            <td style={{padding:'11px 14px',fontWeight:700,color:ac,whiteSpace:'nowrap'}}>₱{o.total.toLocaleString('en-PH',{minimumFractionDigits:2})}</td>
                            <td style={{padding:'11px 14px'}}><span style={{background:(canc?C.red:C.green)+'22',color:canc?C.red:C.green,borderRadius:20,padding:'3px 10px',fontSize:11,fontWeight:700,whiteSpace:'nowrap'}}>{canc?'❌':'✅'} {o.status}</span></td>
                          </tr>
                        );
                      })}
                      <tr style={{background:'#f0ebe5',borderTop:`2px solid ${C.border}`}}>
                        <td colSpan={5} style={{padding:'12px 14px',fontWeight:700,color:C.navy,fontSize:13}}>Period Total</td>
                        <td style={{padding:'12px 14px',fontWeight:700,color:ac,fontSize:14}}>
                          ₱{periodOrders.filter(o=>!['cancelled','failed','rejected'].includes((o.status||'').toLowerCase())).reduce((s,o)=>s+o.total,0).toLocaleString('en-PH',{minimumFractionDigits:2})}
                        </td>
                        <td style={{padding:'12px 14px',color:C.gray,fontSize:12}}>{periodOrders.length} orders</td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </>
        )}

        {/* ── Top Items ── */}
        {tab==='items'&&(
          <>
            {storeOrders.length>0&&<FilterBar/>}
            {!topItems.length ? noData : (
              <div style={card}>
                <p style={{fontWeight:700,color:C.navy,margin:'0 0 14px',fontSize:14}}>
                  Top Items — {store} {quickPct!=='all'?`(${QUICK_PCTS.find(q=>q.id===quickPct)?.label})`:'(All Time)'}
                </p>
                {mob ? (
                  <div style={{display:'grid',gap:10}}>
                    {topItems.map((item,i)=>{
                      const pct=Math.round((item.qty/topItems[0].qty)*100);
                      return (
                        <div key={i} style={{padding:'10px 0',borderBottom:i<topItems.length-1?`1px solid ${C.border}`:'none'}}>
                          <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                            <span style={{fontWeight:600,color:C.navy,fontSize:13}}>
                              <span style={{color:i<3?ac:C.gray,fontWeight:700}}>#{i+1}</span> {item.name}
                            </span>
                            <span style={{color:C.navy,fontSize:13,fontWeight:600}}>{item.qty}×</span>
                          </div>
                          <div style={{display:'flex',alignItems:'center',gap:8}}>
                            <div style={{background:C.border,borderRadius:20,height:7,flex:1}}><div style={{background:ac,borderRadius:20,height:7,width:`${pct}%`}}/></div>
                            <span style={{fontSize:11,color:C.gray,width:28}}>{pct}%</span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                ) : (
                  <table style={{width:'100%',borderCollapse:'collapse'}}>
                    <thead><tr style={{background:C.cream}}>
                      {['Rank','Item Name','Qty Sold','% of Top'].map(h=>(
                        <th key={h} style={{textAlign:'left',padding:'10px 14px',fontSize:11,fontWeight:700,color:C.gray,textTransform:'uppercase',letterSpacing:.5}}>{h}</th>
                      ))}
                    </tr></thead>
                    <tbody>
                      {topItems.map((item,i)=>{
                        const pct=Math.round((item.qty/topItems[0].qty)*100);
                        return (
                          <tr key={i} style={{borderTop:`1px solid ${C.border}`}}>
                            <td style={{padding:'13px 14px',fontWeight:700,color:i<3?ac:C.gray,fontSize:15}}>#{i+1}</td>
                            <td style={{padding:'13px 14px',fontWeight:600,color:C.navy}}>{item.name}</td>
                            <td style={{padding:'13px 14px',color:C.navy}}>{item.qty}×</td>
                            <td style={{padding:'13px 14px',minWidth:160}}>
                              <div style={{display:'flex',alignItems:'center',gap:8}}>
                                <div style={{background:C.border,borderRadius:20,height:8,flex:1}}><div style={{background:ac,borderRadius:20,height:8,width:`${pct}%`}}/></div>
                                <span style={{fontSize:12,color:C.gray,width:32}}>{pct}%</span>
                              </div>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                )}
              </div>
            )}
          </>
        )}

        {/* ── Reminders ── */}
        {tab==='reminders'&&(
          <div>
            <div style={{...card,marginBottom:12}}>
              <p style={{fontWeight:700,color:C.navy,margin:'0 0 12px',fontSize:14}}>Add Reminder</p>
              <div style={{display:'grid',gap:10}}>
                <input style={inp} placeholder="e.g. Restock coffee beans…" value={newRem.text}
                  onChange={e=>setNewRem({...newRem,text:e.target.value})} onKeyDown={e=>e.key==='Enter'&&addRem()}/>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                  <input type="date" style={inp} value={newRem.due} onChange={e=>setNewRem({...newRem,due:e.target.value})}/>
                  <select style={{...inp,cursor:'pointer'}} value={newRem.store} onChange={e=>setNewRem({...newRem,store:e.target.value})}>
                    {STORES.map(s=><option key={s} value={s}>{STORE_ICON[s]} {s}</option>)}
                  </select>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr auto',gap:10}}>
                  <select style={{...inp,cursor:'pointer'}} value={newRem.priority} onChange={e=>setNewRem({...newRem,priority:e.target.value})}>
                    <option value="high">🔴 High</option>
                    <option value="medium">🟡 Medium</option>
                    <option value="low">🟢 Low</option>
                  </select>
                  <button style={btn(ac)} onClick={addRem}>Add</button>
                </div>
              </div>
            </div>
            <div style={{display:'grid',gap:10}}>
              {!filtRem.length&&<p style={{color:C.gray,textAlign:'center',padding:40,fontSize:14}}>No reminders. Add one above!</p>}
              {[...filtRem].sort((a,b)=>(a.done-b.done)||(new Date(a.due||'9999')-new Date(b.due||'9999'))).map(r=>{
                const od=!r.done&&r.due&&new Date(r.due)<new Date(), sc=STORE_COLOR[r.store]||C.gray;
                return (
                  <div key={r.id} style={{...card,display:'flex',alignItems:'flex-start',gap:10,opacity:r.done?.6:1,borderLeft:`4px solid ${PRI_COLOR[r.priority]}`}}>
                    <input type="checkbox" checked={r.done} onChange={()=>toggleRem(r.id)} style={{width:18,height:18,cursor:'pointer',marginTop:2,flexShrink:0}}/>
                    <div style={{flex:1,minWidth:0}}>
                      <p style={{margin:0,fontWeight:600,color:C.navy,textDecoration:r.done?'line-through':'none',fontSize:14}}>{r.text}</p>
                      <div style={{display:'flex',gap:6,marginTop:5,flexWrap:'wrap'}}>
                        {r.due&&<p style={{margin:0,fontSize:11,color:od?C.red:C.gray}}>📅 {od?'⚠️ ':''}{r.due}</p>}
                        <span style={{background:sc+'22',color:sc,borderRadius:20,padding:'1px 8px',fontSize:11,fontWeight:600}}>{STORE_ICON[r.store]||'🏪'} {r.store}</span>
                        <span style={{background:PRI_COLOR[r.priority],color:'#fff',borderRadius:6,padding:'1px 8px',fontSize:11,fontWeight:700}}>{r.priority.toUpperCase()}</span>
                      </div>
                    </div>
                    <button onClick={()=>deleteRem(r.id)} style={{background:'none',border:'none',cursor:'pointer',color:C.gray,fontSize:20,lineHeight:1,padding:0,flexShrink:0}}>×</button>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>

      {mob&&<BottomNav/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard/>);
</script>
</body>
</html>
